version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: lasernet-db
    environment:
      POSTGRES_USER: lasernet_user
      POSTGRES_PASSWORD: lasernet_password
      POSTGRES_DB: lasernet
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lasernet_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lasernet_network

  # LaserNet Portal (Next.js)
  portal:
    build:
      context: ./services/portal
      dockerfile: Dockerfile
    container_name: lasernet-portal
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://lasernet_user:lasernet_password@postgres:5432/lasernet
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production}
      ROBOT_SERVICE_URL: http://robot:8080
      RELFAR_SERVICE_URL: http://relfar:5000
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./services/portal:/app
      - /app/node_modules
    networks:
      - lasernet_network
    command: sh -c "npm install && npx prisma generate && npx prisma db push && npm run dev"

  # Robot Service (FastAPI)
  robot:
    build:
      context: ./services/robot
      dockerfile: Dockerfile
    container_name: lasernet-robot
    ports:
      - "8080:8080"
    environment:
      ROBOT_IP: 192.168.10.10
      ROBOT_PORT: 10003
      ROBOT_TIMEOUT: 30
      PYTHON_ENV: development
    volumes:
      - ./services/robot:/app
    networks:
      - lasernet_network
    command: python run.py

  # Relfar Service (Flask)
  relfar:
    build:
      context: ./services/relfar
      dockerfile: Dockerfile
    container_name: lasernet-relfar
    ports:
      - "5000:5000"
    environment:
      RELFAR_DEFAULT_PORT: COM5
      RELFAR_BAUD_RATE: 115200
      PYTHON_ENV: development
    volumes:
      - ./services/relfar:/app
    networks:
      - lasernet_network
    command: python server.py

volumes:
  postgres_data:
    driver: local

networks:
  lasernet_network:
    driver: bridge
